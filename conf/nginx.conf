user root;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /opt/hostpanel/plugins/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp directories under the plugin dir (avoids /usr/local/nginx compile-time defaults)
    client_body_temp_path /opt/hostpanel/plugins/nginx/client_body_temp;
    proxy_temp_path       /opt/hostpanel/plugins/nginx/proxy_temp;
    fastcgi_temp_path     /opt/hostpanel/plugins/nginx/fastcgi_temp;
    uwsgi_temp_path       /opt/hostpanel/plugins/nginx/uwsgi_temp;
    scgi_temp_path        /opt/hostpanel/plugins/nginx/scgi_temp;

    sendfile        on;
    keepalive_timeout 65;

    # ── Hosted site vhosts ────────────────────────────────────────────────────
    # Each domain provisioned through HostPanel gets its own config here.
    include /opt/hostpanel/plugins/nginx/vhosts/*.conf;

    # ── Default server ────────────────────────────────────────────────────────
    # Drop connections that don't match any provisioned vhost (direct IP access,
    # unknown hostnames). The panel itself runs on port 2082 — NOT through Nginx.
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }
}
