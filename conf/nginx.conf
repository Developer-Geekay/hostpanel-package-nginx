user root;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Hosted site vhosts ────────────────────────────────────────────────────
    # Each domain provisioned through HostPanel gets its own config here.
    include /opt/hostpanel/nginx/vhosts/*.conf;

    # ── Default server ────────────────────────────────────────────────────────
    # Drop connections that don't match any provisioned vhost (direct IP access,
    # unknown hostnames). The panel itself runs on port 2082 — NOT through Nginx.
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }
}
